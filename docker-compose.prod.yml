version: '3.8'

services:
  # 1. PostgreSQL Database Container (Strictly Capped)
  db:
    image: postgres:15-alpine
    container_name: metalhub-prod-db
    restart: always
    environment:
      POSTGRES_USER: metalhub_admin
      POSTGRES_PASSWORD: secure_postgres_password_123
      POSTGRES_DB: metalhub_production
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - metalhub-net

  # 2. Redis Message Broker Container (Strictly Capped)
  redis:
    image: redis:7-alpine
    container_name: metalhub-prod-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata_prod:/data
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - metalhub-net

  # 3. Strapi Headless CMS Container (ARM64 Native Alpine, Capped)
  cms:
    image: node:20-alpine
    container_name: metalhub-prod-cms
    restart: always
    working_dir: /opt/app
    volumes:
      - ./apps/cms:/opt/app
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: metalhub_production
      DATABASE_USERNAME: metalhub_admin
      DATABASE_PASSWORD: secure_postgres_password_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEXT_FRONTEND_URL: ${NEXT_FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_OPTIONS: --max-old-space-size=1536
    depends_on:
      - db
      - redis
    command: sh -c "mkdir -p public/uploads && npm install --include=dev --legacy-peer-deps && npm run build && npm run start"
    deploy:
      resources:
        limits:
          memory: 1800M
    networks:
      - metalhub-net

  # 4. Next.js App Router Frontend Container (ARM64 Native Alpine, Capped)
  web:
    image: node:20-alpine
    container_name: metalhub-prod-web
    restart: always
    working_dir: /opt/app
    volumes:
      - ./apps/web:/opt/app
      - /opt/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL}
      STRAPI_API_URL: ${STRAPI_API_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-metalhub-drawings}
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL:-https://api.hubapi.com/webhooks/v1/mock-deal-ingest}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-SECURE_REVALIDATION_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TRELLO_API_KEY: ${TRELLO_API_KEY}
      TRELLO_TOKEN: ${TRELLO_TOKEN}
      TRELLO_LIST_ID: ${TRELLO_LIST_ID}
      NODE_OPTIONS: --max-old-space-size=1536
    depends_on:
      - cms
    command: sh -c "npm install --include=dev --legacy-peer-deps --ignore-scripts && npm run build && npm run start"
    deploy:
      resources:
        limits:
          memory: 1500M
    networks:
      - metalhub-net

volumes:
  pgdata_prod:
  redisdata_prod:

networks:
  metalhub-net:
    driver: bridge
