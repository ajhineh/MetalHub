version: '3.8'

services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: metalhub-db
    restart: always
    environment:
      POSTGRES_USER: metalhub_admin
      POSTGRES_PASSWORD: secure_postgres_password_123
      POSTGRES_DB: metalhub_production
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - metalhub-net

  # 2. Redis Message Broker Container
  redis:
    image: redis:7-alpine
    container_name: metalhub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - metalhub-net

  # 3. Strapi Headless CMS Container
  cms:
    image: node:18-alpine
    container_name: metalhub-cms
    restart: always
    working_dir: /opt/app
    volumes:
      - ./apps/cms:/opt/app
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: metalhub_production
      DATABASE_USERNAME: metalhub_admin
      DATABASE_PASSWORD: secure_postgres_password_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    command: sh -c "npm install && npm run develop"
    networks:
      - metalhub-net

  # 4. Next.js App Router Frontend Container
  web:
    image: node:20-alpine
    container_name: metalhub-web
    restart: always
    working_dir: /opt/app
    volumes:
      - ./apps/web:/opt/app
      - /opt/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_CMS_URL: http://cms:1337
      STRAPI_API_URL: http://cms:1337
      AWS_REGION: eu-west-1
      AWS_S3_BUCKET: metalhub-drawings
      CRM_WEBHOOK_URL: https://api.hubapi.com/webhooks/v1/mock-deal-ingest
      REVALIDATION_SECRET: SECURE_REVALIDATION_TOKEN
    depends_on:
      - cms
    command: sh -c "npm install && npm run dev"
    networks:
      - metalhub-net

  # 5. Neo4j Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: metalhub-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/secure_neo4j_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    networks:
      - metalhub-net

  # 6. RabbitMQ Message Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: metalhub-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: metalhub_mq
      RABBITMQ_DEFAULT_PASS: secure_mq_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - mqdata:/var/lib/rabbitmq/mnesia
    networks:
      - metalhub-net

  # 7. Prometheus Monitoring
  prometheus:
    image: prom/prometheus
    container_name: metalhub-prometheus
    restart: always
    ports:
      - "9090:9090"
    networks:
      - metalhub-net

  # 8. Grafana Dashboard
  grafana:
    image: grafana/grafana
    container_name: metalhub-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: secure_grafana_password
    depends_on:
      - prometheus
    networks:
      - metalhub-net

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  mqdata:

networks:
  metalhub-net:
    driver: bridge
